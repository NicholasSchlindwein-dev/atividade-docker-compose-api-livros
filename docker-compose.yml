services:
  app:
    build: .
    container_name: atividade_app
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: atividade_db
    depends_on:
      - db
    restart: unless-stopped

  db:
    image: mysql:8.0
    container_name: atividade_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: atividade_db
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    restart: unless-stopped

volumes:
  db_data:
